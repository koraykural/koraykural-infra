name: Deploy backend app

# Reusable workflow — call from a project repo:
#
#   jobs:
#     deploy:
#       uses: koraykural/koraykural-infra/.github/workflows/deploy-backend.yml@main
#       with:
#         subdomain: someapp
#         pm2_name: someapp
#         app_dir: /var/www/someapp.koraykural.com
#       secrets:
#         VPS_HOST: ${{ secrets.VPS_HOST }}
#         VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

on:
  workflow_call:
    inputs:
      subdomain:
        description: 'Subdomain (without .koraykural.com)'
        required: true
        type: string
      pm2_name:
        description: 'PM2 process name'
        required: true
        type: string
      app_dir:
        description: 'Absolute path to app directory on VPS'
        required: false
        default: ''
        type: string
      migrate_command:
        description: 'Migration command to run after install (e.g. "npx prisma migrate deploy")'
        required: false
        default: ''
        type: string
      build_command:
        description: 'Build command to run before restarting (e.g. "npm run build" for Next.js)'
        required: false
        default: ''
        type: string
    secrets:
      VPS_HOST:
        required: true
      VPS_SSH_KEY:
        required: true
      DATABASE_URL:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DATABASE_URL
          script: |
            DIR="${{ inputs.app_dir }}"
            if [ -z "$DIR" ]; then
              DIR="/var/www/${{ inputs.subdomain }}.koraykural.com"
            fi
            cd "$DIR"
            git pull
            npm ci
            if [ -n "${{ inputs.migrate_command }}" ]; then
              ${{ inputs.migrate_command }}
            fi
            if [ -n "${{ inputs.build_command }}" ]; then
              ${{ inputs.build_command }}
            fi
            pm2 restart ${{ inputs.pm2_name }}
