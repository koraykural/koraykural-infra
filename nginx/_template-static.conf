# Template for static subdomains (copy and replace PROJECT_NAME)
server {
    listen 80;
    server_name PROJECT_NAME.koraykural.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name PROJECT_NAME.koraykural.com;

    ssl_certificate /etc/letsencrypt/live/PROJECT_NAME.koraykural.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PROJECT_NAME.koraykural.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/PROJECT_NAME.koraykural.com;
    index index.html;

    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
